trigger:
- main   # or master, depending on your repo branch

pool:
  vmImage: 'ubuntu-latest'

steps:
# Step 1: Build and Push Docker Image to Docker Hub
- task: Docker@2
  inputs:
    containerRegistry: 'dockerhub-connection'   # exact name of your Docker Hub service connection
    repository: 'vyshnav123456789/vyshnav'      # your Docker Hub repo path
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'                 # adjust if Dockerfile is in a subfolder
    tags: |
      $(Build.BuildId)



